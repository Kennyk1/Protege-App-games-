<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Protege Battle</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;touch-action:none;}
  canvas{display:block;position:absolute;top:0;left:0;}
  #topHud{position:fixed;top:0;left:0;right:0;z-index:50;padding:8px 12px;display:none;pointer-events:none;}
  .top-row{display:flex;justify-content:space-between;align-items:flex-start;}
  .zone-box{background:rgba(0,0,0,0.55);border:1px solid rgba(0,150,255,0.4);border-radius:10px;padding:4px 14px;text-align:center;}
  .zone-label{font-size:9px;color:#0af;letter-spacing:0.1em;text-transform:uppercase;}
  .zone-time{font-family:'Orbitron',monospace;font-size:16px;font-weight:900;color:#0af;text-shadow:0 0 10px #0af;}
  .enemy-box{background:rgba(0,0,0,0.55);border:1px solid rgba(255,45,85,0.3);border-radius:10px;padding:6px 12px;min-width:130px;}
  .enemy-name{font-size:11px;color:#ff6b6b;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
  .enemy-hp-bar{height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;}
  .enemy-hp-fill{height:100%;background:linear-gradient(90deg,#ff2d55,#ff6b35);border-radius:4px;transition:width 0.2s;}
  .enemy-hp-val{font-family:'Orbitron',monospace;font-size:10px;color:#ff6b6b;margin-top:2px;text-align:right;}
  #killfeed{position:fixed;top:70px;left:12px;z-index:50;pointer-events:none;}
  .kf-item{background:rgba(0,0,0,0.6);border-left:3px solid #ff2d55;padding:4px 10px;margin-bottom:4px;font-size:12px;color:#fff;border-radius:0 6px 6px 0;animation:kfAnim 3s forwards;}
  @keyframes kfAnim{0%{opacity:0;transform:translateX(-20px);}10%{opacity:1;transform:translateX(0);}80%{opacity:1;}100%{opacity:0;}}
  .hp-section{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);width:200px;text-align:center;z-index:50;pointer-events:none;display:none;}
  .hp-bar-wrap{background:rgba(0,0,0,0.5);border:1px solid rgba(0,255,100,0.2);border-radius:20px;height:12px;overflow:hidden;margin-bottom:3px;}
  .hp-bar-fill{height:100%;background:linear-gradient(90deg,#ff2d55,#ff9500,#00ff88);border-radius:20px;transition:width 0.3s;}
  .hp-text{font-family:'Orbitron',monospace;font-size:11px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.8);}
  .gun-box{position:fixed;bottom:110px;left:160px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:8px 12px;z-index:50;pointer-events:none;display:none;}
  .gun-name{font-size:13px;font-weight:700;color:#fff;}
  .gun-ammo{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:#ffd700;}
  .gun-ammo span{font-size:12px;color:rgba(255,255,255,0.4);}
  #joystickWrap{position:fixed;bottom:40px;left:20px;z-index:50;width:130px;height:130px;display:none;}
  #jBase{width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.15);position:absolute;}
  #jKnob{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.4);position:absolute;top:39px;left:39px;}
  #actionBtns{position:fixed;bottom:40px;right:16px;z-index:50;display:none;position:fixed;}
  .fire-btn{width:88px;height:88px;border-radius:50%;background:radial-gradient(circle,rgba(255,45,85,0.5),rgba(180,0,30,0.3));border:3px solid #ff2d55;color:#fff;font-family:'Orbitron',monospace;font-size:13px;font-weight:900;cursor:pointer;box-shadow:0 0 25px rgba(255,45,85,0.4);letter-spacing:0.05em;transition:transform 0.08s;display:block;}
  .fire-btn:active{transform:scale(0.88);box-shadow:0 0 40px rgba(255,45,85,0.8);}
  .aim-btn{width:54px;height:54px;border-radius:50%;background:rgba(0,0,0,0.5);border:2px solid rgba(255,165,0,0.6);color:orange;font-size:10px;font-family:'Orbitron',monospace;font-weight:700;cursor:pointer;display:block;margin-bottom:10px;margin-left:auto;}
  .aim-btn:active{background:rgba(255,165,0,0.25);}
  .reload-btn{width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,0.5);border:2px solid rgba(100,200,255,0.4);color:#6cf;font-size:11px;font-family:'Orbitron',monospace;cursor:pointer;display:block;margin-bottom:10px;margin-left:auto;}
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:80;padding:20px;}
  #lobbyScreen{background:linear-gradient(160deg,#060012,#010008);}
  .logo{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;letter-spacing:0.05em;margin-bottom:2px;}
  .logo-p{color:#00ffcc;}.logo-b{color:#ff2d55;}
  .tagline{font-size:12px;color:rgba(255,255,255,0.3);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:32px;}
  .card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:18px;padding:20px;width:100%;max-width:320px;margin-bottom:12px;}
  .card-title{font-size:11px;color:rgba(255,255,255,0.4);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:14px;}
  .lbtn{width:100%;padding:15px;border-radius:12px;border:none;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.05em;margin-bottom:8px;}
  .lbtn:last-child{margin-bottom:0;}.lbtn:active{opacity:0.75;}
  .btn-solo{background:linear-gradient(135deg,#ffd700,#ff9500);color:#000;}
  .btn-create{background:linear-gradient(135deg,#00ffcc,#00aa88);color:#000;}
  .btn-join{background:linear-gradient(135deg,#b44fff,#7722cc);color:#fff;}
  .inp{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:13px 16px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:20px;outline:none;margin-bottom:10px;text-align:center;letter-spacing:0.3em;text-transform:uppercase;}
  .inp:focus{border-color:#b44fff;}
  #waitingScreen{background:rgba(0,0,0,0.97);display:none;}
  .wt-title{font-family:'Orbitron',monospace;font-size:20px;color:#00ffcc;margin-bottom:6px;}
  .room-code{font-family:'Orbitron',monospace;font-size:52px;font-weight:900;color:#ffd700;text-shadow:0 0 30px #ffd700;letter-spacing:0.12em;margin-bottom:6px;}
  .wt-sub{font-size:13px;color:rgba(255,255,255,0.35);margin-bottom:28px;}
  .pslot{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:11px 16px;margin-bottom:8px;display:flex;align-items:center;gap:10px;width:100%;max-width:280px;}
  .pdot{width:8px;height:8px;border-radius:50%;background:#00ffcc;box-shadow:0 0 6px #00ffcc;}
  #startBtn{background:linear-gradient(135deg,#ff2d55,#cc0033);color:#fff;border:none;padding:15px 44px;border-radius:12px;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;cursor:pointer;display:none;margin-top:8px;}
  #resultScreen{background:rgba(0,0,0,0.97);display:none;}
  .res-icon{font-size:60px;margin-bottom:12px;}
  .res-title{font-family:'Orbitron',monospace;font-size:34px;font-weight:900;margin-bottom:6px;}
  .res-sub{font-size:14px;color:rgba(255,255,255,0.4);margin-bottom:28px;}
  .res-stats{display:flex;gap:24px;margin-bottom:28px;}
  .rstat{text-align:center;}
  .rstat-v{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:#ffd700;}
  .rstat-l{font-size:11px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:0.08em;margin-top:3px;}
  .rbtn{border:none;padding:15px 44px;border-radius:12px;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;cursor:pointer;margin:5px;}
  #notif{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);z-index:90;font-family:'Orbitron',monospace;font-size:24px;font-weight:900;text-align:center;pointer-events:none;opacity:0;transition:opacity 0.25s;}
  #dmgFlash{position:fixed;inset:0;z-index:45;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center,transparent 30%,rgba(255,0,0,0.4));transition:opacity 0.15s;}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="dmgFlash"></div>
<div id="topHud">
  <div class="top-row">
    <div id="killfeed"></div>
    <div class="zone-box"><div class="zone-label">Safe Zone</div><div class="zone-time" id="zoneTime">60s</div></div>
    <div class="enemy-box">
      <div class="enemy-name"><svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="#ff2d55"/></svg><span id="enemyName">Enemy</span></div>
      <div class="enemy-hp-bar"><div class="enemy-hp-fill" id="eHpFill" style="width:100%"></div></div>
      <div class="enemy-hp-val"><span id="eHpVal">100</span> HP</div>
    </div>
  </div>
</div>
<div class="hp-section" id="hpSection">
  <div class="hp-bar-wrap"><div class="hp-bar-fill" id="mHpFill" style="width:100%"></div></div>
  <div class="hp-text"><span id="mHpVal">100</span> / 100 HP</div>
</div>
<div class="gun-box" id="gunBox">
  <div class="gun-name" id="gunName">M4A1</div>
  <div class="gun-ammo"><span id="ammoCount">30</span><span> / 90</span></div>
</div>
<div id="joystickWrap"><div id="jBase"></div><div id="jKnob"></div></div>
<div id="actionBtns">
  <button class="aim-btn" ontouchstart="setAim(true)" ontouchend="setAim(false)">AIM</button>
  <button class="reload-btn" onclick="reload()">↺</button>
  <button class="fire-btn" ontouchstart="shoot()">FIRE</button>
</div>
<div id="notif"></div>
<div class="screen" id="lobbyScreen">
  <div class="logo"><span class="logo-p">PRO</span><span class="logo-b">TEGE</span></div>
  <div class="tagline">Battle Royale · 1v1</div>
  <div class="card">
    <div class="card-title">Choose Mode</div>
    <button class="lbtn btn-solo" onclick="startSolo()">⚡ Solo vs Bot</button>
    <button class="lbtn btn-create" onclick="createRoom()">🏆 Create Room</button>
    <button class="lbtn btn-join" style="margin-bottom:0" onclick="toggleJoin()">🎮 Join Room</button>
  </div>
  <div class="card" id="joinCard" style="display:none;">
    <div class="card-title">Enter Room Code</div>
    <input class="inp" id="codeInput" placeholder="XXXXXX" maxlength="6"/>
    <button class="lbtn btn-join" style="margin-bottom:0" onclick="joinRoom()">Join</button>
  </div>
</div>
<div class="screen" id="waitingScreen">
  <div class="wt-title">Share Room Code</div>
  <div class="room-code" id="roomCodeEl">------</div>
  <div class="wt-sub">Waiting for opponent...</div>
  <div id="pList"></div>
  <button id="startBtn" onclick="requestStart()">▶ START GAME</button>
  <button onclick="leaveRoom()" style="margin-top:14px;background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);padding:10px 24px;border-radius:10px;font-family:'Rajdhani',sans-serif;cursor:pointer;">Leave</button>
</div>
<div class="screen" id="resultScreen">
  <div class="res-icon" id="resIcon">🏆</div>
  <div class="res-title" id="resTitle">VICTORY!</div>
  <div class="res-sub" id="resSub">You eliminated your opponent</div>
  <div class="res-stats">
    <div class="rstat"><div class="rstat-v" id="resKills">0</div><div class="rstat-l">Kills</div></div>
    <div class="rstat"><div class="rstat-v" id="resDmg">0</div><div class="rstat-l">Damage</div></div>
    <div class="rstat"><div class="rstat-v" id="resTime">0s</div><div class="rstat-l">Survived</div></div>
  </div>
  <button class="rbtn" style="background:linear-gradient(135deg,#00ffcc,#00aa88);color:#000;" onclick="goLobby()">PLAY AGAIN</button>
</div>
<script>
const API='https://sample-api-1-ryj7.onrender.com';
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

let gameRunning=false,isSolo=false,isCreator=false;
let currentRoomId=null,currentRoomCode=null,myPlayerId=null;
let myHP=100,enemyHP=100,myKills=0,totalDamage=0;
let gameStartTime=0,isAiming=false,ammo=30;
let particles=[],bullets=[],muzzleFlashes=[],dmgNums=[];
let zoneTimer=60,zoneR=0;
let zoneInt,botInt,pollInt,lastFire=0;

const GUN={damage:22,hsMulti:4.5,range:0.65,color:'#00ffcc',rate:160};

let me={x:0,y:0,angle:0,alive:true};
let enemy={x:0,y:0,angle:0,alive:true,name:'Enemy'};
let joy={active:false,sx:0,sy:0,dx:0,dy:0};
const JMAX=48;
let envObjs=[];

// JOYSTICK
const jWrap=document.getElementById('joystickWrap');
const jKnob=document.getElementById('jKnob');
jWrap.addEventListener('touchstart',e=>{joy.active=true;joy.sx=e.touches[0].clientX;joy.sy=e.touches[0].clientY;e.preventDefault();},{passive:false});
jWrap.addEventListener('touchmove',e=>{
  if(!joy.active)return;
  joy.dx=e.touches[0].clientX-joy.sx;joy.dy=e.touches[0].clientY-joy.sy;
  const l=Math.sqrt(joy.dx**2+joy.dy**2);
  if(l>JMAX){joy.dx=(joy.dx/l)*JMAX;joy.dy=(joy.dy/l)*JMAX;}
  jKnob.style.left=(39+joy.dx)+'px';jKnob.style.top=(39+joy.dy)+'px';
  e.preventDefault();
},{passive:false});
jWrap.addEventListener('touchend',()=>{joy.active=false;joy.dx=0;joy.dy=0;jKnob.style.left='39px';jKnob.style.top='39px';});

function genEnv(){
  envObjs=[];
  const types=['box','tree','wall','rock'];
  for(let i=0;i<16;i++){
    let ox,oy,tries=0;
    do{ox=80+Math.random()*(W-160);oy=80+Math.random()*(H-160);tries++;}
    while(((Math.abs(ox-me.x)<90&&Math.abs(oy-me.y)<90)||(Math.abs(ox-enemy.x)<90&&Math.abs(oy-enemy.y)<90))&&tries<30);
    const t=types[Math.floor(Math.random()*types.length)];
    const sz={box:28,tree:22,wall:40,rock:24};
    envObjs.push({x:ox,y:oy,type:t,r:sz[t]});
  }
}

function setAim(v){isAiming=v;notify(v?'🎯 AIM MODE':'','v?orange:""');}
function reload(){ammo=30;document.getElementById('ammoCount').textContent=30;notify('↺ RELOADED','#6cf');}

function shoot(){
  if(!gameRunning||!me.alive||!enemy.alive)return;
  const now=Date.now();if(now-lastFire<GUN.rate)return;lastFire=now;
  if(ammo<=0){notify('NO AMMO!','#ff2d55');return;}
  ammo--;document.getElementById('ammoCount').textContent=ammo;
  const dx=enemy.x-me.x,dy=enemy.y-me.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>Math.min(W,H)*GUN.range){notify('OUT OF RANGE','orange');return;}
  const spread=isAiming?0.02:(joy.active?0.14:0.05);
  const angle=Math.atan2(dy,dx)+(Math.random()-0.5)*spread*2;
  muzzleFlashes.push({x:me.x,y:me.y,life:6});
  const isHS=Math.random()<(isAiming?0.3:0.08);
  const dmg=isHS?Math.min(100,Math.round(GUN.damage*GUN.hsMulti)):GUN.damage+Math.floor(Math.random()*10);
  bullets.push({x:me.x,y:me.y,vx:Math.cos(angle)*14,vy:Math.sin(angle)*14,color:isHS?'#ffd700':GUN.color,isHS,dmg,owner:'me',life:25});
  totalDamage+=dmg;enemyHP=Math.max(0,enemyHP-dmg);updateEnemyHP();
  spawnFx(enemy.x,enemy.y,isHS?'#ffd700':'#ff2d55',isHS?18:7);
  dmgNums.push({x:enemy.x+(Math.random()-0.5)*30,y:enemy.y-20,val:dmg,color:isHS?'#ffd700':'#ff6b35',isHS,life:1});
  if(isHS)notify('💀 HEADSHOT!','#ffd700');
  if(enemyHP<=0&&enemy.alive){enemy.alive=false;myKills++;addKF('You eliminated '+enemy.name);setTimeout(()=>endGame(true),700);}
}

function startBot(){
  botInt=setInterval(()=>{
    if(!gameRunning||!enemy.alive||!me.alive)return;
    const dist=Math.sqrt((me.x-enemy.x)**2+(me.y-enemy.y)**2);
    enemy.angle=Math.atan2(me.y-enemy.y,me.x-enemy.x);
    if(dist>100){
      const nx=enemy.x+Math.cos(enemy.angle)*2.4;
      const ny=enemy.y+Math.sin(enemy.angle)*2.4;
      const blocked=envObjs.some(o=>Math.sqrt((nx-o.x)**2+(ny-o.y)**2)<o.r+16);
      if(!blocked){enemy.x=nx;enemy.y=ny;}
      else{enemy.x+=(Math.random()-0.5)*5;enemy.y+=(Math.random()-0.5)*5;}
    }
    if(dist<Math.min(W,H)*0.6&&Math.random()<0.28){
      const isHS=Math.random()<0.1;
      const dmg=isHS?100:Math.floor(Math.random()*20)+12;
      const spr=(Math.random()-0.5)*0.2;
      bullets.push({x:enemy.x,y:enemy.y,vx:Math.cos(enemy.angle+spr)*13,vy:Math.sin(enemy.angle+spr)*13,color:'#ff6b35',isHS,dmg,owner:'bot',life:20});
    }
  },120);
}

function spawnFx(x,y,color,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*7;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:0.04+Math.random()*0.04,color,size:2+Math.random()*3});}
}

// DRAW
function drawBG(){
  ctx.fillStyle='#141420';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.025)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=56){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=56){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // Dirt patches
  ctx.fillStyle='rgba(100,75,40,0.07)';
  [[W*.3,H*.4,80],[W*.7,H*.6,65],[W*.5,H*.25,55],[W*.2,H*.7,45]].forEach(([x,y,r])=>{ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();});
}

function drawZone(){
  ctx.save();
  ctx.fillStyle='rgba(0,70,180,0.13)';ctx.fillRect(0,0,W,H);
  ctx.globalCompositeOperation='destination-out';
  ctx.beginPath();ctx.arc(W/2,H/2,zoneR,0,Math.PI*2);ctx.fill();
  ctx.globalCompositeOperation='source-over';
  ctx.strokeStyle=zoneTimer<=10?'#ff2d55':'#0099ff';ctx.lineWidth=3;
  ctx.shadowColor=zoneTimer<=10?'#ff2d55':'#0099ff';ctx.shadowBlur=15;
  ctx.setLineDash([8,4]);ctx.beginPath();ctx.arc(W/2,H/2,zoneR,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);ctx.shadowBlur=0;ctx.restore();
}

function drawEnv(){
  envObjs.forEach(o=>{
    ctx.save();ctx.translate(o.x,o.y);
    if(o.type==='box'){
      ctx.fillStyle='#4a3828';ctx.strokeStyle='#6b5040';ctx.lineWidth=2;
      ctx.fillRect(-o.r/2,-o.r/2,o.r,o.r);ctx.strokeRect(-o.r/2,-o.r/2,o.r,o.r);
      ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(-o.r/2,0);ctx.lineTo(o.r/2,0);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,-o.r/2);ctx.lineTo(0,o.r/2);ctx.stroke();
    }else if(o.type==='tree'){
      ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(4,7,o.r,o.r*.6,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#5a3a1a';ctx.fillRect(-4,-2,8,12);
      ctx.fillStyle='#2d5a1b';ctx.shadowColor='#2d5a1b';ctx.shadowBlur=6;
      ctx.beginPath();ctx.arc(0,-4,o.r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#4a8a2a';ctx.beginPath();ctx.arc(-5,-9,o.r*.65,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    }else if(o.type==='wall'){
      ctx.fillStyle='#55556a';ctx.strokeStyle='#77778a';ctx.lineWidth=2;
      ctx.fillRect(-o.r/2,-9,o.r,18);ctx.strokeRect(-o.r/2,-9,o.r,18);
      ctx.fillStyle='rgba(0,0,0,0.15)';
      for(let i=0;i<3;i++)ctx.fillRect(-o.r/2+i*o.r/3+2,-7,o.r/3-4,6);
      for(let i=0;i<2;i++)ctx.fillRect(-o.r/2+o.r/6+i*o.r/3+2,2,o.r/3-4,6);
    }else{
      ctx.fillStyle='#445566';ctx.strokeStyle='#667788';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(0,-o.r);ctx.lineTo(o.r*.8,-o.r*.3);ctx.lineTo(o.r*.6,o.r*.7);ctx.lineTo(-o.r*.6,o.r*.7);ctx.lineTo(-o.r*.8,-o.r*.3);ctx.closePath();
      ctx.fill();ctx.stroke();
    }
    ctx.restore();
  });
}

function drawChar(p,isMe){
  if(!p.alive)return;
  ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle+Math.PI/2);
  const col=isMe?'#00ffcc':'#ff2d55';
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(3,9,13,7,0,0,Math.PI*2);ctx.fill();
  ctx.shadowColor=col;ctx.shadowBlur=12;
  // Boots
  ctx.fillStyle=isMe?'#1a2a1a':'#2a1a1a';
  ctx.fillRect(-8,8,7,5);ctx.fillRect(2,8,7,5);
  // Legs
  ctx.fillStyle=isMe?'#2a4a2a':'#4a2a2a';
  ctx.fillRect(-7,2,6,8);ctx.fillRect(2,2,6,8);
  // Body/vest
  ctx.fillStyle=isMe?'#1a3a2a':'#3a1a1a';
  ctx.beginPath();ctx.roundRect(-9,-4,18,8,3);ctx.fill();
  ctx.fillStyle=isMe?'#2a5a3a':'#5a2a2a';
  ctx.beginPath();ctx.roundRect(-8,-3,16,6,2);ctx.fill();
  // Arms
  ctx.fillStyle=isMe?'#2a4a2a':'#4a2a2a';
  ctx.fillRect(-12,-2,5,7);ctx.fillRect(8,-2,5,7);
  // Head
  ctx.fillStyle=isMe?'#3a6a4a':'#6a3a3a';
  ctx.beginPath();ctx.arc(0,-9,7,0,Math.PI*2);ctx.fill();
  // Helmet
  ctx.fillStyle=col;ctx.beginPath();ctx.arc(0,-9,7,Math.PI,0);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.15)';ctx.beginPath();ctx.arc(0,-9,5,Math.PI+0.3,0-0.3);ctx.fill();
  // Eyes
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath();ctx.ellipse(-2.5,-9.5,2,1.5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(2.5,-9.5,2,1.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(-2,-9.5,1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(3,-9.5,1,0,Math.PI*2);ctx.fill();
  // GUN on right arm
  ctx.fillStyle='#2a2a2a';ctx.strokeStyle='#444';ctx.lineWidth=1.5;
  ctx.fillRect(7,-4,20,5);ctx.strokeRect(7,-4,20,5);
  ctx.fillStyle='#1a1a1a';ctx.fillRect(21,-2.5,9,3);
  ctx.fillStyle=col;ctx.shadowColor=col;ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(30,0,2.5,0,Math.PI*2);ctx.fill();
  // Mag
  ctx.fillStyle='#333';ctx.fillRect(12,1,6,5);
  ctx.shadowBlur=0;
  // Name tag
  ctx.rotate(-(p.angle+Math.PI/2));
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.beginPath();ctx.roundRect(-22,-36,44,14,3);ctx.fill();
  ctx.fillStyle=col;ctx.font='bold 10px Rajdhani,sans-serif';ctx.textAlign='center';
  ctx.fillText(isMe?'YOU':p.name,0,-25);
  ctx.restore();
}

function drawBullets(){
  bullets.forEach(b=>{
    ctx.save();ctx.shadowColor=b.color;ctx.shadowBlur=12;ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(b.x,b.y,b.isHS?5:3,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle=b.color;ctx.lineWidth=2;ctx.globalAlpha=0.3;
    ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-b.vx*3,b.y-b.vy*3);ctx.stroke();
    ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.restore();
  });
}

function drawMuzzle(){
  muzzleFlashes.forEach(f=>{
    ctx.save();ctx.fillStyle=`rgba(255,200,50,${f.life/6})`;ctx.shadowColor='#ffcc33';ctx.shadowBlur=25;
    ctx.beginPath();ctx.arc(f.x,f.y,10,0,Math.PI*2);ctx.fill();ctx.restore();
  });
}

function drawFx(){
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;ctx.shadowBlur=0;
  dmgNums.forEach(d=>{ctx.globalAlpha=d.life;ctx.font=`bold ${d.isHS?22:15}px Orbitron,monospace`;ctx.textAlign='center';ctx.fillStyle=d.color;ctx.shadowColor=d.color;ctx.shadowBlur=10;ctx.fillText(d.isHS?'💀'+d.val:'-'+d.val,d.x,d.y);});
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

function gameLoop(){
  if(!gameRunning)return;
  if(joy.active&&me.alive){
    const spd=isAiming?1.5:3.5;
    let nx=me.x+(joy.dx/JMAX)*spd,ny=me.y+(joy.dy/JMAX)*spd;
    nx=Math.max(20,Math.min(W-20,nx));ny=Math.max(20,Math.min(H-20,ny));
    if(!envObjs.some(o=>Math.sqrt((nx-o.x)**2+(ny-o.y)**2)<o.r+14)){me.x=nx;me.y=ny;}
  }
  if(enemy.alive)me.angle=Math.atan2(enemy.y-me.y,enemy.x-me.x);
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];b.x+=b.vx;b.y+=b.vy;b.life--;
    if(envObjs.some(o=>Math.sqrt((b.x-o.x)**2+(b.y-o.y)**2)<o.r)||b.life<=0||b.x<0||b.x>W||b.y<0||b.y>H){bullets.splice(i,1);continue;}
    if(b.owner==='bot'&&me.alive&&Math.sqrt((b.x-me.x)**2+(b.y-me.y)**2)<18){
      myHP=Math.max(0,myHP-b.dmg);updateMyHP();spawnFx(me.x,me.y,'#ff6b35',6);
      dmgNums.push({x:me.x+(Math.random()-0.5)*30,y:me.y-20,val:b.dmg,color:'#ff6b35',isHS:b.isHS,life:1});
      const fl=document.getElementById('dmgFlash');fl.style.opacity='1';setTimeout(()=>fl.style.opacity='0',150);
      bullets.splice(i,1);if(myHP<=0){me.alive=false;endGame(false);return;}
    }
  }
  const zd=Math.sqrt((me.x-W/2)**2+(me.y-H/2)**2);
  if(zd>zoneR&&me.alive){myHP=Math.max(0,myHP-0.07);updateMyHP();if(myHP<=0){me.alive=false;endGame(false);return;}}
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=p.decay;if(p.life<=0)particles.splice(i,1);}
  for(let i=muzzleFlashes.length-1;i>=0;i--){muzzleFlashes[i].life--;if(muzzleFlashes[i].life<=0)muzzleFlashes.splice(i,1);}
  for(let i=dmgNums.length-1;i>=0;i--){dmgNums[i].y-=1.5;dmgNums[i].life-=0.025;if(dmgNums[i].life<=0)dmgNums.splice(i,1);}
  drawBG();drawZone();drawEnv();drawMuzzle();drawBullets();drawFx();drawChar(enemy,false);drawChar(me,true);
  requestAnimationFrame(gameLoop);
}

function startZone(){
  zoneR=Math.min(W,H)*.47;
  zoneInt=setInterval(()=>{
    zoneTimer--;document.getElementById('zoneTime').textContent=zoneTimer+'s';
    if(zoneTimer<=10)document.getElementById('zoneTime').style.color='#ff2d55';
    if(zoneTimer<=0){zoneR=Math.max(60,zoneR-15);zoneTimer=20;notify('⚠️ ZONE CLOSING','#ff2d55');}
  },1000);
}

function showUI(){
  document.getElementById('topHud').style.display='block';
  document.getElementById('hpSection').style.display='block';
  document.getElementById('gunBox').style.display='block';
  document.getElementById('joystickWrap').style.display='block';
  document.getElementById('actionBtns').style.display='block';
}

function updateMyHP(){
  const h=Math.ceil(myHP);document.getElementById('mHpVal').textContent=h;document.getElementById('mHpFill').style.width=myHP+'%';
  document.getElementById('mHpFill').style.background=myHP>60?'linear-gradient(90deg,#00cc88,#00ff88)':myHP>30?'linear-gradient(90deg,#ff9500,#ffcc00)':'linear-gradient(90deg,#660011,#ff2d55)';
}
function updateEnemyHP(){document.getElementById('eHpVal').textContent=Math.ceil(enemyHP);document.getElementById('eHpFill').style.width=enemyHP+'%';}
function addKF(t){const e=document.createElement('div');e.className='kf-item';e.textContent='☠️ '+t;document.getElementById('killfeed').appendChild(e);setTimeout(()=>e.remove(),3000);}
function notify(t,c){const e=document.getElementById('notif');e.textContent=t;e.style.color=c;e.style.textShadow=`0 0 20px ${c}`;e.style.opacity='1';clearTimeout(e._t);e._t=setTimeout(()=>e.style.opacity='0',1400);}

function initState(){myHP=100;enemyHP=100;myKills=0;totalDamage=0;ammo=30;zoneTimer=60;particles=[];bullets=[];muzzleFlashes=[];dmgNums=[];lastFire=0;isAiming=false;me.alive=true;enemy.alive=true;gameStartTime=Date.now();document.getElementById('zoneTime').style.color='#0af';document.getElementById('ammoCount').textContent=30;}

function startSolo(){
  isSolo=true;document.getElementById('lobbyScreen').style.display='none';
  initState();me.x=W*.22;me.y=H*.55;enemy.x=W*.78;enemy.y=H*.45;
  enemy.name='🤖 BOT';document.getElementById('enemyName').textContent=enemy.name;
  genEnv();showUI();startZone();gameRunning=true;gameLoop();startBot();
  notify('GAME START!','#00ffcc');
}

function endGame(won){
  gameRunning=false;clearInterval(zoneInt);clearInterval(botInt);clearInterval(pollInt);
  const s=Math.floor((Date.now()-gameStartTime)/1000);
  setTimeout(()=>{
    document.getElementById('topHud').style.display='none';document.getElementById('hpSection').style.display='none';
    document.getElementById('gunBox').style.display='none';document.getElementById('joystickWrap').style.display='none';document.getElementById('actionBtns').style.display='none';
    document.getElementById('resIcon').textContent=won?'🏆':'💀';
    document.getElementById('resTitle').textContent=won?'VICTORY!':'ELIMINATED';
    document.getElementById('resTitle').style.color=won?'#ffd700':'#ff2d55';
    document.getElementById('resSub').textContent=won?'You eliminated your opponent!':'Better luck next time!';
    document.getElementById('resKills').textContent=myKills;document.getElementById('resDmg').textContent=totalDamage;document.getElementById('resTime').textContent=s+'s';
    document.getElementById('resultScreen').style.display='flex';
  },900);
}

function goLobby(){document.getElementById('resultScreen').style.display='none';document.getElementById('lobbyScreen').style.display='flex';document.getElementById('killfeed').innerHTML='';isSolo=false;currentRoomId=null;}

async function apiCall(ep,m='GET',b=null){const o={method:m,headers:{'Content-Type':'application/json','Authorization':`Bearer ${localStorage.getItem('protege_token')}`}};if(b)o.body=JSON.stringify(b);const r=await fetch(API+ep,o);return r.json();}
async function createRoom(){try{const d=await apiCall('/api/game/room/create','POST',{max_players:2,entry_fee:0});if(d.success){currentRoomId=d.room_id;currentRoomCode=d.room_code;isCreator=true;showWaiting();pollWaiting();}else notify(d.error||'Failed','#ff2d55');}catch(e){notify('Error','#ff2d55');}}
function toggleJoin(){const c=document.getElementById('joinCard');c.style.display=c.style.display==='none'?'block':'none';}
async function joinRoom(){const code=document.getElementById('codeInput').value.toUpperCase().trim();if(code.length!==6){notify('Enter 6-char code','#ff2d55');return;}try{const d=await apiCall('/api/game/room/join','POST',{room_code:code});if(d.success){currentRoomId=d.room_id;currentRoomCode=code;isCreator=false;showWaiting();pollWaiting();}else notify(d.error||'Failed','#ff2d55');}catch(e){notify('Error','#ff2d55');}}
function showWaiting(){document.getElementById('lobbyScreen').style.display='none';document.getElementById('waitingScreen').style.display='flex';document.getElementById('roomCodeEl').textContent=currentRoomCode;if(isCreator)document.getElementById('startBtn').style.display='block';}
let wPoll;
async function pollWaiting(){wPoll=setInterval(async()=>{if(!currentRoomId)return;const d=await apiCall(`/api/game/room/${currentRoomId}`);if(d.success){document.getElementById('pList').innerHTML=d.players.map(p=>`<div class="pslot"><div class="pdot"></div>${p.users?.name||'Player'}</div>`).join('');if(d.room.status==='active'){clearInterval(wPoll);startMP(d.players);}}},2000);}
async function requestStart(){const d=await apiCall(`/api/game/room/${currentRoomId}/start`,'POST');if(!d.success)notify(d.error||'Error','#ff2d55');}
async function leaveRoom(){if(currentRoomId)await apiCall(`/api/game/room/${currentRoomId}/leave`,'POST');clearInterval(wPoll);goLobby();}
function startMP(players){document.getElementById('waitingScreen').style.display='none';initState();me.x=W*.22;me.y=H*.55;enemy.x=W*.78;enemy.y=H*.45;const o=players.find(p=>p.user_id!==myPlayerId);if(o)enemy.name=o.users?.name||'Enemy';document.getElementById('enemyName').textContent=enemy.name;genEnv();showUI();startZone();gameRunning=true;gameLoop();pollInt=setInterval(syncMP,600);notify('GAME START!','#00ffcc');}
async function syncMP(){if(!currentRoomId)return;try{const d=await apiCall(`/api/game/state/${currentRoomId}`);if(d.success){const o=d.players.find(p=>p.user_id!==myPlayerId);if(o){enemy.x=o.position_x*(W/800);enemy.y=o.position_y*(H/800);enemyHP=o.health;updateEnemyHP();if(o.status==='dead'&&enemy.alive){enemy.alive=false;endGame(true);}}}}catch(e){}if(me.alive)apiCall('/api/game/move','POST',{room_id:currentRoomId,x:me.x/(W/800),y:me.y/(H/800)});}
try{const t=localStorage.getItem('protege_token');if(t){const p=JSON.parse(atob(t.split('.')[1]));myPlayerId=p.user_id;}}catch(e){}
</script>
</body>
</html>
