<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Protege Battle</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
  :root{
    --bg:#0a0a0f;
    --neon:#00ffcc;
    --danger:#ff2d55;
    --gold:#ffd700;
    --purple:#b44fff;
    --zone:#00aaff;
    --text:#e0e0ff;
  }
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Rajdhani',sans-serif;touch-action:none;}

  canvas{display:block;position:absolute;top:0;left:0;}

  /* HUD TOP */
  #hud{position:fixed;top:0;left:0;right:0;z-index:50;padding:10px 16px;display:none;justify-content:space-between;align-items:flex-start;pointer-events:none;}
  
  /* Health bar */
  .health-wrap{display:flex;flex-direction:column;gap:4px;}
  .health-label{font-size:11px;color:var(--neon);letter-spacing:0.1em;text-transform:uppercase;}
  .health-bar-bg{width:140px;height:10px;background:rgba(255,255,255,0.1);border-radius:5px;overflow:hidden;border:1px solid rgba(0,255,204,0.2);}
  .health-bar{height:100%;background:linear-gradient(90deg,#ff2d55,#ff6b35,#00ffcc);border-radius:5px;transition:width 0.3s;}
  .health-val{font-family:'Orbitron',monospace;font-size:13px;color:var(--text);}

  /* Zone timer */
  .zone-info{text-align:center;}
  .zone-label{font-size:11px;color:var(--zone);letter-spacing:0.08em;text-transform:uppercase;}
  .zone-timer{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:var(--zone);text-shadow:0 0 15px var(--zone);}

  /* Enemy health */
  .enemy-wrap{text-align:right;}

  /* Kill feed */
  #killfeed{position:fixed;top:80px;right:16px;z-index:50;display:flex;flex-direction:column;gap:4px;pointer-events:none;}
  .kill-item{background:rgba(0,0,0,0.6);border:1px solid rgba(255,45,85,0.3);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--text);animation:fadeKill 3s forwards;}
  @keyframes fadeKill{0%{opacity:1;transform:translateX(0);}70%{opacity:1;}100%{opacity:0;transform:translateX(20px);}}

  /* CONTROLS */
  #joystickWrap{position:fixed;bottom:60px;left:30px;z-index:50;width:120px;height:120px;}
  #joystickBase{width:120px;height:120px;border-radius:50%;background:rgba(0,255,204,0.06);border:2px solid rgba(0,255,204,0.2);position:absolute;}
  #joystickKnob{width:50px;height:50px;border-radius:50%;background:rgba(0,255,204,0.2);border:2px solid var(--neon);position:absolute;top:35px;left:35px;box-shadow:0 0 15px rgba(0,255,204,0.3);}

  /* Action buttons */
  #controls{position:fixed;bottom:60px;right:20px;z-index:50;display:flex;flex-direction:column;gap:16px;align-items:center;}
  .action-btn{width:70px;height:70px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:0.05em;transition:transform 0.1s;}
  .action-btn:active{transform:scale(0.9);}
  #shootBtn{background:radial-gradient(circle,rgba(255,45,85,0.3),rgba(255,45,85,0.1));border:2px solid var(--danger);color:var(--danger);box-shadow:0 0 20px rgba(255,45,85,0.3);width:80px;height:80px;}
  #aimBtn{background:radial-gradient(circle,rgba(255,165,0,0.2),rgba(255,165,0,0.05));border:2px solid orange;color:orange;font-size:10px;}

  /* Aim indicator */
  #aimMode{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:45;pointer-events:none;display:none;}

  /* SCREENS */
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:80;padding:24px;}

  #lobbyScreen{background:radial-gradient(ellipse at center,#080018,var(--bg));}
  .game-logo{font-family:'Orbitron',monospace;font-size:36px;font-weight:900;color:var(--neon);text-shadow:0 0 30px var(--neon);margin-bottom:4px;}
  .game-tagline{font-size:13px;color:rgba(224,224,255,0.4);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:40px;}

  .lobby-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:24px;width:100%;max-width:340px;margin-bottom:16px;}
  .lobby-card-title{font-size:12px;color:var(--neon);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:16px;}
  .input-field{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:16px;outline:none;margin-bottom:10px;}
  .input-field:focus{border-color:var(--neon);}
  .input-field::placeholder{color:rgba(224,224,255,0.3);}

  .lobby-btn{width:100%;padding:16px;border-radius:14px;border:none;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.05em;margin-bottom:10px;transition:opacity 0.2s;}
  .lobby-btn:active{opacity:0.8;}
  .btn-create{background:linear-gradient(135deg,var(--neon),#00aa88);color:#000;}
  .btn-join{background:linear-gradient(135deg,var(--purple),#8833cc);color:#fff;}
  .btn-solo{background:linear-gradient(135deg,var(--gold),#cc8800);color:#000;}

  .divider{display:flex;align-items:center;gap:12px;margin:8px 0;color:rgba(224,224,255,0.2);font-size:12px;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.06);}

  /* Waiting room */
  #waitingScreen{background:rgba(0,0,0,0.95);display:none;}
  .waiting-title{font-family:'Orbitron',monospace;font-size:24px;color:var(--neon);margin-bottom:8px;}
  .room-code-display{font-family:'Orbitron',monospace;font-size:48px;font-weight:900;color:var(--gold);text-shadow:0 0 30px var(--gold);letter-spacing:0.1em;margin-bottom:8px;}
  .waiting-sub{font-size:14px;color:rgba(224,224,255,0.4);margin-bottom:32px;}
  .players-list{width:100%;max-width:300px;margin-bottom:32px;}
  .player-slot{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;font-size:15px;}
  .player-dot{width:10px;height:10px;border-radius:50%;background:var(--neon);box-shadow:0 0 8px var(--neon);}
  #startGameBtn{background:linear-gradient(135deg,var(--danger),#cc0033);color:white;border:none;padding:16px 48px;border-radius:14px;font-family:'Orbitron',monospace;font-size:15px;font-weight:700;cursor:pointer;display:none;}

  /* Game over */
  #resultScreen{background:rgba(0,0,0,0.96);display:none;}
  .result-icon{font-size:64px;margin-bottom:16px;}
  .result-title{font-family:'Orbitron',monospace;font-size:32px;font-weight:900;margin-bottom:8px;}
  .result-sub{font-size:15px;color:rgba(224,224,255,0.5);margin-bottom:32px;}
  .result-stats{display:flex;gap:20px;margin-bottom:32px;}
  .result-stat{text-align:center;}
  .result-stat-val{font-family:'Orbitron',monospace;font-size:28px;font-weight:900;color:var(--gold);}
  .result-stat-label{font-size:12px;color:rgba(224,224,255,0.4);text-transform:uppercase;letter-spacing:0.08em;margin-top:4px;}
  .result-btn{background:linear-gradient(135deg,var(--neon),#00aa88);color:#000;border:none;padding:16px 48px;border-radius:14px;font-family:'Orbitron',monospace;font-size:14px;font-weight:700;cursor:pointer;margin:6px;}

  /* Notifications */
  #notification{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:90;font-family:'Orbitron',monospace;font-size:28px;font-weight:900;text-align:center;pointer-events:none;opacity:0;transition:opacity 0.3s;}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="health-wrap">
    <div class="health-label">Health</div>
    <div class="health-bar-bg"><div class="health-bar" id="myHealthBar" style="width:100%"></div></div>
    <div class="health-val"><span id="myHP">100</span> HP</div>
  </div>
  <div class="zone-info">
    <div class="zone-label">Zone closes in</div>
    <div class="zone-timer" id="zoneTimer">60s</div>
  </div>
  <div class="enemy-wrap">
    <div class="health-label" style="text-align:right;color:var(--danger)">Enemy</div>
    <div class="health-bar-bg" style="background:rgba(255,45,85,0.1);border-color:rgba(255,45,85,0.2);">
      <div class="health-bar" id="enemyHealthBar" style="width:100%;background:linear-gradient(90deg,#660011,#ff2d55);"></div>
    </div>
    <div class="health-val" style="text-align:right;"><span id="enemyHP">100</span> HP</div>
  </div>
</div>

<!-- Kill feed -->
<div id="killfeed"></div>

<!-- Joystick -->
<div id="joystickWrap" style="display:none;">
  <div id="joystickBase"></div>
  <div id="joystickKnob"></div>
</div>

<!-- Controls -->
<div id="controls" style="display:none;">
  <button class="action-btn" id="aimBtn" ontouchstart="toggleAim(true)" ontouchend="toggleAim(false)">AIM</button>
  <button class="action-btn" id="shootBtn" ontouchstart="shoot()">FIRE</button>
</div>

<!-- Aim crosshair -->
<div id="aimMode">
  <svg width="60" height="60" viewBox="0 0 60 60">
    <circle cx="30" cy="30" r="25" fill="none" stroke="rgba(255,45,85,0.6)" stroke-width="1.5"/>
    <circle cx="30" cy="30" r="3" fill="#ff2d55"/>
    <line x1="30" y1="0" x2="30" y2="20" stroke="#ff2d55" stroke-width="1.5"/>
    <line x1="30" y1="40" x2="30" y2="60" stroke="#ff2d55" stroke-width="1.5"/>
    <line x1="0" y1="30" x2="20" y2="30" stroke="#ff2d55" stroke-width="1.5"/>
    <line x1="40" y1="30" x2="60" y2="30" stroke="#ff2d55" stroke-width="1.5"/>
  </svg>
</div>

<!-- Notification -->
<div id="notification"></div>

<!-- LOBBY -->
<div class="screen" id="lobbyScreen">
  <div class="game-logo">PROTEGE</div>
  <div class="game-tagline">Battle Royale · 1v1</div>

  <div class="lobby-card">
    <div class="lobby-card-title">Quick Match</div>
    <button class="lobby-btn btn-solo" onclick="startSolo()">⚡ Play Solo (vs Bot)</button>
    <div class="divider">or multiplayer</div>
    <button class="lobby-btn btn-create" onclick="showCreate()">🏆 Create Room</button>
    <button class="lobby-btn btn-join" style="margin-bottom:0" onclick="showJoin()">🎮 Join Room</button>
  </div>

  <div class="lobby-card" id="joinCard" style="display:none;">
    <div class="lobby-card-title">Enter Room Code</div>
    <input class="input-field" id="roomCodeInput" placeholder="e.g. AB12CD" maxlength="6" style="text-transform:uppercase;letter-spacing:0.2em;font-size:22px;text-align:center;"/>
    <button class="lobby-btn btn-join" style="margin-bottom:0" onclick="joinRoom()">Join Game</button>
  </div>
</div>

<!-- WAITING ROOM -->
<div class="screen" id="waitingScreen">
  <div class="waiting-title">Waiting for players...</div>
  <div class="room-code-display" id="roomCodeDisplay">------</div>
  <div class="waiting-sub">Share this code with your opponent</div>
  <div class="players-list" id="playersList"></div>
  <button id="startGameBtn" onclick="startMatch()">START GAME</button>
  <button onclick="leaveRoom()" style="background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);padding:10px 24px;border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:14px;cursor:pointer;margin-top:16px;">Leave Room</button>
</div>

<!-- RESULT -->
<div class="screen" id="resultScreen">
  <div class="result-icon" id="resultIcon">🏆</div>
  <div class="result-title" id="resultTitle">VICTORY!</div>
  <div class="result-sub" id="resultSub">You eliminated your opponent</div>
  <div class="result-stats">
    <div class="result-stat">
      <div class="result-stat-val" id="resultKills">0</div>
      <div class="result-stat-label">Kills</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-val" id="resultDamage">0</div>
      <div class="result-stat-label">Damage</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-val" id="resultTime">0s</div>
      <div class="result-stat-label">Survived</div>
    </div>
  </div>
  <button class="result-btn" onclick="goLobby()">PLAY AGAIN</button>
</div>

<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const API = 'https://sample-api-1-ryj7.onrender.com';
const SUPABASE_URL = 'https://your-project.supabase.co'; // will use API
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════
let gameRunning = false;
let isSolo = false;
let isCreator = false;
let currentRoomId = null;
let currentRoomCode = null;
let myPlayerId = null;
let myName = 'Player';

let myHP = 100;
let enemyHP = 100;
let myKills = 0;
let totalDamage = 0;
let gameStartTime = 0;
let isAiming = false;
let particles = [];
let bullets = [];
let muzzleFlashes = [];

// Zone
let zone = { x: 0, y: 0, r: 0, targetR: 0, shrinkSpeed: 0 };
let zoneTimer = 60;
let zoneInterval;

// Players on canvas
let me = { x: 0, y: 0, angle: 0, speed: 0, vx: 0, vy: 0, alive: true };
let enemy = { x: 0, y: 0, angle: 0, alive: true, name: 'Enemy' };

// Joystick
let joystick = { active: false, startX: 0, startY: 0, dx: 0, dy: 0 };
const JOYSTICK_MAX = 45;

// Polling
let stateInterval = null;

// ═══════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════
function getToken() { return localStorage.getItem('protege_token'); }

async function apiCall(endpoint, method = 'GET', body = null) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}${endpoint}`, opts);
  return res.json();
}

// ═══════════════════════════════════════════════
// LOBBY
// ═══════════════════════════════════════════════
function showCreate() {
  document.getElementById('joinCard').style.display = 'none';
  createRoom();
}

function showJoin() {
  const card = document.getElementById('joinCard');
  card.style.display = card.style.display === 'none' ? 'block' : 'none';
}

async function createRoom() {
  try {
    const data = await apiCall('/api/game/room/create', 'POST', { max_players: 2, entry_fee: 0 });
    if (data.success) {
      currentRoomId = data.room_id;
      currentRoomCode = data.room_code;
      isCreator = true;
      showWaiting();
      pollWaiting();
    } else {
      showNotification(data.error || 'Failed to create room', '#ff2d55');
    }
  } catch(e) {
    showNotification('Network error', '#ff2d55');
  }
}

async function joinRoom() {
  const code = document.getElementById('roomCodeInput').value.toUpperCase().trim();
  if (code.length !== 6) return showNotification('Enter valid room code', '#ff2d55');
  try {
    const data = await apiCall('/api/game/room/join', 'POST', { room_code: code });
    if (data.success) {
      currentRoomId = data.room_id;
      currentRoomCode = code;
      isCreator = false;
      showWaiting();
      pollWaiting();
    } else {
      showNotification(data.error || 'Failed to join', '#ff2d55');
    }
  } catch(e) {
    showNotification('Network error', '#ff2d55');
  }
}

function showWaiting() {
  document.getElementById('lobbyScreen').style.display = 'none';
  document.getElementById('waitingScreen').style.display = 'flex';
  document.getElementById('roomCodeDisplay').textContent = currentRoomCode;
  if (isCreator) document.getElementById('startGameBtn').style.display = 'block';
}

let waitingPoll;
async function pollWaiting() {
  waitingPoll = setInterval(async () => {
    if (!currentRoomId) return;
    try {
      const data = await apiCall(`/api/game/room/${currentRoomId}`);
      if (data.success) {
        updatePlayersList(data.players);
        if (data.room.status === 'active') {
          clearInterval(waitingPoll);
          initGame(data.players);
        }
      }
    } catch(e) {}
  }, 2000);
}

function updatePlayersList(players) {
  const list = document.getElementById('playersList');
  list.innerHTML = players.map(p => `
    <div class="player-slot">
      <div class="player-dot"></div>
      ${p.users?.name || 'Player'}
      ${p.status === 'alive' ? '<span style="margin-left:auto;font-size:12px;color:var(--neon);">READY</span>' : ''}
    </div>
  `).join('');
}

async function startMatch() {
  try {
    const data = await apiCall(`/api/game/room/${currentRoomId}/start`, 'POST');
    if (!data.success) showNotification(data.error || 'Cannot start', '#ff2d55');
  } catch(e) {}
}

async function leaveRoom() {
  if (currentRoomId) await apiCall(`/api/game/room/${currentRoomId}/leave`, 'POST');
  clearInterval(waitingPoll);
  goLobby();
}

// ═══════════════════════════════════════════════
// SOLO MODE (vs Bot)
// ═══════════════════════════════════════════════
function startSolo() {
  isSolo = true;
  currentRoomId = 'solo';
  document.getElementById('lobbyScreen').style.display = 'none';
  initGameSolo();
}

function initGameSolo() {
  myHP = 100;
  enemyHP = 100;
  myKills = 0;
  totalDamage = 0;
  gameStartTime = Date.now();
  particles = [];
  bullets = [];

  me.x = W * 0.25;
  me.y = H * 0.5;
  me.alive = true;

  enemy.x = W * 0.75;
  enemy.y = H * 0.5;
  enemy.alive = true;
  enemy.name = '🤖 Bot';

  zone.x = W / 2;
  zone.y = H / 2;
  zone.r = Math.min(W, H) * 0.48;
  zone.targetR = zone.r * 0.3;
  zoneTimer = 60;

  showHUD();
  startZoneTimer();
  gameRunning = true;
  gameLoop();
  startBotAI();
}

// ═══════════════════════════════════════════════
// MULTIPLAYER GAME INIT
// ═══════════════════════════════════════════════
function initGame(players) {
  myHP = 100; enemyHP = 100;
  myKills = 0; totalDamage = 0;
  gameStartTime = Date.now();
  particles = []; bullets = [];

  const token = getToken();
  // assign positions
  me.x = W * 0.25; me.y = H * 0.5; me.alive = true;
  enemy.x = W * 0.75; enemy.y = H * 0.5; enemy.alive = true;

  const otherPlayer = players.find(p => p.user_id !== myPlayerId);
  if (otherPlayer) enemy.name = otherPlayer.users?.name || 'Enemy';

  zone.x = W/2; zone.y = H/2;
  zone.r = Math.min(W,H) * 0.48;
  zone.targetR = zone.r * 0.3;
  zoneTimer = 60;

  document.getElementById('waitingScreen').style.display = 'none';
  showHUD();
  startZoneTimer();
  gameRunning = true;
  gameLoop();

  // Poll game state
  stateInterval = setInterval(pollGameState, 500);
}

async function pollGameState() {
  if (!currentRoomId || currentRoomId === 'solo') return;
  try {
    const data = await apiCall(`/api/game/state/${currentRoomId}`);
    if (data.success) {
      const other = data.players.find(p => p.user_id !== myPlayerId);
      if (other) {
        enemy.x = other.position_x * (W / 800);
        enemy.y = other.position_y * (H / 800);
        enemyHP = other.health;
        updateEnemyHP(enemyHP);
        if (other.status === 'dead' && enemy.alive) {
          enemy.alive = false;
          endGame(true);
        }
      }
      if (data.room.status === 'finished') {
        clearInterval(stateInterval);
      }
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════════
// BOT AI
// ═══════════════════════════════════════════════
let botInterval;
function startBotAI() {
  botInterval = setInterval(() => {
    if (!gameRunning || !enemy.alive) return;

    // Move towards player with slight randomness
    const dx = me.x - enemy.x;
    const dy = me.y - enemy.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist > 120) {
      enemy.x += (dx/dist) * 1.8 + (Math.random()-0.5)*2;
      enemy.y += (dy/dist) * 1.8 + (Math.random()-0.5)*2;
    }

    enemy.angle = Math.atan2(dy, dx);

    // Bot shoots when close enough
    if (dist < 200 && Math.random() < 0.3) {
      botShoot();
    }
  }, 100);
}

function botShoot() {
  if (!me.alive) return;
  const isHeadshot = Math.random() < 0.15;
  const damage = isHeadshot ? 100 : Math.floor(Math.random() * 20) + 10;

  // Bullet from enemy to me
  bullets.push({
    x: enemy.x, y: enemy.y,
    tx: me.x, ty: me.y,
    vx: (me.x - enemy.x) / 15,
    vy: (me.y - enemy.y) / 15,
    color: '#ff6b35',
    owner: 'bot',
    damage, isHeadshot,
    life: 15
  });
}

// ═══════════════════════════════════════════════
// JOYSTICK
// ═══════════════════════════════════════════════
const jwrap = document.getElementById('joystickWrap');
const knob = document.getElementById('joystickKnob');

jwrap.addEventListener('touchstart', e => {
  joystick.active = true;
  joystick.startX = e.touches[0].clientX;
  joystick.startY = e.touches[0].clientY;
  e.preventDefault();
}, {passive:false});

jwrap.addEventListener('touchmove', e => {
  if (!joystick.active) return;
  joystick.dx = e.touches[0].clientX - joystick.startX;
  joystick.dy = e.touches[0].clientY - joystick.startY;
  const len = Math.sqrt(joystick.dx**2 + joystick.dy**2);
  if (len > JOYSTICK_MAX) {
    joystick.dx = (joystick.dx/len)*JOYSTICK_MAX;
    joystick.dy = (joystick.dy/len)*JOYSTICK_MAX;
  }
  knob.style.left = (35 + joystick.dx) + 'px';
  knob.style.top = (35 + joystick.dy) + 'px';
  e.preventDefault();
}, {passive:false});

jwrap.addEventListener('touchend', () => {
  joystick.active = false;
  joystick.dx = 0; joystick.dy = 0;
  knob.style.left = '35px'; knob.style.top = '35px';
});

// ═══════════════════════════════════════════════
// SHOOTING
// ═══════════════════════════════════════════════
function toggleAim(val) { isAiming = val; document.getElementById('aimMode').style.display = val ? 'block' : 'none'; }

function shoot() {
  if (!gameRunning || !me.alive || !enemy.alive) return;

  // Check if in range
  const dx = enemy.x - me.x;
  const dy = enemy.y - me.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const maxRange = isAiming ? W * 0.7 : W * 0.4;

  if (dist > maxRange) {
    showNotification('Out of range!', 'rgba(255,200,0,0.9)');
    return;
  }

  // Headshot if aiming and close enough
  const isHeadshot = isAiming && dist < 150 && Math.random() < 0.35;
  const damage = isHeadshot ? 100 : Math.floor(Math.random() * 25) + 15;

  // Muzzle flash
  muzzleFlashes.push({ x: me.x, y: me.y, life: 5 });

  // Bullet
  bullets.push({
    x: me.x, y: me.y,
    vx: dx/dist * 12,
    vy: dy/dist * 12,
    color: isHeadshot ? '#ffd700' : '#00ffcc',
    owner: 'me',
    damage, isHeadshot,
    life: 20
  });

  totalDamage += damage;

  // Apply damage
  if (isHeadshot) {
    enemyHP = 0;
    showNotification('💀 HEADSHOT!', '#ffd700');
    spawnParticles(enemy.x, enemy.y, '#ffd700', 20);
  } else {
    enemyHP = Math.max(0, enemyHP - damage);
    spawnParticles(enemy.x, enemy.y, '#ff2d55', 8);
    if (dist < 80) showNotification(`${damage} DMG`, '#ff6b35');
  }

  updateEnemyHP(enemyHP);

  if (enemyHP <= 0 && enemy.alive) {
    enemy.alive = false;
    myKills++;
    addKillFeed(`${myName} eliminated ${enemy.name}`);

    if (!isSolo && currentRoomId) {
      const otherPlayers = [];
      apiCall('/api/game/shoot', 'POST', {
        room_id: currentRoomId,
        target_id: otherPlayers[0],
        damage: isHeadshot ? 100 : damage
      });
    }
    setTimeout(() => endGame(true), 800);
  }
}

// ═══════════════════════════════════════════════
// ZONE
// ═══════════════════════════════════════════════
function startZoneTimer() {
  zoneInterval = setInterval(() => {
    zoneTimer--;
    document.getElementById('zoneTimer').textContent = zoneTimer + 's';
    if (zoneTimer <= 0) {
      zone.r = Math.max(60, zone.r - 8);
      zoneTimer = 15;
      document.getElementById('zoneTimer').style.color = '#ff2d55';
    }
    // Zone damage
    if (me.alive) {
      const dx = me.x - zone.x;
      const dy = me.y - zone.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > zone.r) {
        myHP = Math.max(0, myHP - 3);
        updateMyHP(myHP);
        if (myHP <= 0) endGame(false);
      }
    }
  }, 1000);
}

// ═══════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 2 + Math.random() * 6;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, decay: 0.05+Math.random()*0.05, color, size: 2+Math.random()*3 });
  }
}

// ═══════════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════════
function drawBackground() {
  // Dark gradient
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.8);
  grad.addColorStop(0, '#0d0d1a');
  grad.addColorStop(1, '#04040a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(100,100,180,0.06)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 50) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 50) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function drawZone() {
  // Outside zone — dark danger area
  ctx.save();
  ctx.fillStyle = 'rgba(0,100,255,0.08)';
  ctx.fillRect(0, 0, W, H);

  // Clear inside zone
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  ctx.arc(zone.x, zone.y, zone.r, 0, Math.PI*2);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';

  // Zone border
  ctx.strokeStyle = zoneTimer <= 10 ? '#ff2d55' : '#0088ff';
  ctx.lineWidth = 3;
  ctx.shadowColor = zoneTimer <= 10 ? '#ff2d55' : '#0088ff';
  ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.arc(zone.x, zone.y, zone.r, 0, Math.PI*2);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawPlayer(p, color, name, hp) {
  if (!p.alive) return;
  ctx.save();
  ctx.translate(p.x, p.y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(4, 6, 14, 8, 0, 0, Math.PI*2);
  ctx.fill();

  // Glow
  ctx.shadowColor = color;
  ctx.shadowBlur = 20;

  // Body circle
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(0, 0, 16, 0, Math.PI*2);
  ctx.fill();

  // Inner
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.arc(-4, -4, 7, 0, Math.PI*2);
  ctx.fill();

  // Direction indicator
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.arc(Math.cos(p.angle)*10, Math.sin(p.angle)*10, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Name tag
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.roundRect(-24, -32, 48, 16, 4);
  ctx.fill();
  ctx.fillStyle = color;
  ctx.font = '10px Rajdhani, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(name, 0, -20);

  ctx.restore();
}

function drawBullets() {
  bullets.forEach(b => {
    ctx.save();
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.isHeadshot ? 5 : 3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawMuzzleFlashes() {
  muzzleFlashes.forEach(f => {
    ctx.save();
    ctx.fillStyle = `rgba(255,200,50,${f.life/5})`;
    ctx.shadowColor = '#ffcc33';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(f.x, f.y, 8, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

// ═══════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════
function gameLoop() {
  if (!gameRunning) return;

  // Move player via joystick
  if (joystick.active && me.alive) {
    const speed = 3.5;
    me.x += (joystick.dx / JOYSTICK_MAX) * speed;
    me.y += (joystick.dy / JOYSTICK_MAX) * speed;
    me.x = Math.max(16, Math.min(W-16, me.x));
    me.y = Math.max(16, Math.min(H-16, me.y));
    me.angle = Math.atan2(joystick.dy, joystick.dx);
  }

  // Face enemy
  if (enemy.alive) {
    me.angle = Math.atan2(enemy.y - me.y, enemy.x - me.x);
  }

  // Update bullets
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx; b.y += b.vy; b.life--;
    if (b.life <= 0) bullets.splice(i, 1);
  }

  // Apply bot bullet hits
  for (let i = bullets.length-1; i >= 0; i--) {
    const b = bullets[i];
    if (b.owner === 'bot' && me.alive) {
      const dx = b.x - me.x;
      const dy = b.y - me.y;
      if (Math.sqrt(dx*dx+dy*dy) < 20) {
        myHP = Math.max(0, myHP - b.damage);
        updateMyHP(myHP);
        spawnParticles(me.x, me.y, '#ff6b35', 6);
        if (b.isHeadshot) showNotification('💀 HEADSHOT!', '#ff2d55');
        bullets.splice(i, 1);
        if (myHP <= 0) { me.alive = false; endGame(false); return; }
      }
    }
  }

  // Update particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1; p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Update muzzle flashes
  for (let i = muzzleFlashes.length-1; i >= 0; i--) {
    muzzleFlashes[i].life--;
    if (muzzleFlashes[i].life <= 0) muzzleFlashes.splice(i, 1);
  }

  // DRAW
  drawBackground();
  drawZone();
  drawMuzzleFlashes();
  drawBullets();
  drawParticles();
  drawPlayer(enemy, '#ff2d55', enemy.name, enemyHP);
  drawPlayer(me, '#00ffcc', myName, myHP);

  requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════
// HUD UPDATES
// ═══════════════════════════════════════════════
function showHUD() {
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('joystickWrap').style.display = 'block';
  document.getElementById('controls').style.display = 'flex';
}

function updateMyHP(hp) {
  document.getElementById('myHP').textContent = hp;
  document.getElementById('myHealthBar').style.width = hp + '%';
  document.getElementById('myHealthBar').style.background =
    hp > 60 ? 'linear-gradient(90deg,#00cc88,#00ffcc)' :
    hp > 30 ? 'linear-gradient(90deg,#ff9500,#ffcc00)' :
    'linear-gradient(90deg,#660011,#ff2d55)';
}

function updateEnemyHP(hp) {
  document.getElementById('enemyHP').textContent = hp;
  document.getElementById('enemyHealthBar').style.width = hp + '%';
}

function addKillFeed(text) {
  const feed = document.getElementById('killfeed');
  const item = document.createElement('div');
  item.className = 'kill-item';
  item.textContent = `☠️ ${text}`;
  feed.appendChild(item);
  setTimeout(() => item.remove(), 3000);
}

function showNotification(text, color) {
  const el = document.getElementById('notification');
  el.textContent = text;
  el.style.color = color;
  el.style.textShadow = `0 0 20px ${color}`;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity = '0', 1200);
}

// ═══════════════════════════════════════════════
// END GAME
// ═══════════════════════════════════════════════
function endGame(won) {
  gameRunning = false;
  clearInterval(zoneInterval);
  clearInterval(botInterval);
  clearInterval(stateInterval);

  const survived = Math.floor((Date.now() - gameStartTime) / 1000);

  setTimeout(() => {
    document.getElementById('hud').style.display = 'none';
    document.getElementById('joystickWrap').style.display = 'none';
    document.getElementById('controls').style.display = 'none';

    document.getElementById('resultIcon').textContent = won ? '🏆' : '💀';
    document.getElementById('resultTitle').textContent = won ? 'VICTORY!' : 'ELIMINATED';
    document.getElementById('resultTitle').style.color = won ? '#ffd700' : '#ff2d55';
    document.getElementById('resultSub').textContent = won ? 'You eliminated your opponent!' : 'You were eliminated!';
    document.getElementById('resultKills').textContent = myKills;
    document.getElementById('resultDamage').textContent = totalDamage;
    document.getElementById('resultTime').textContent = survived + 's';
    document.getElementById('resultScreen').style.display = 'flex';
  }, 1000);
}

function goLobby() {
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('lobbyScreen').style.display = 'flex';
  document.getElementById('joinCard').style.display = 'none';
  currentRoomId = null; currentRoomCode = null;
  isSolo = false; isCreator = false;
  myHP = 100; enemyHP = 100;
  document.getElementById('killfeed').innerHTML = '';
}

// Get player name from token
try {
  const t = getToken();
  if (t) {
    const p = JSON.parse(atob(t.split('.')[1]));
    myPlayerId = p.user_id;
  }
} catch(e) {}
</script>
